name: NHK Easy Daily

on:
  push:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cache-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve kotobase database paths
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from kotobase.db_builder.config import DATABASE_PATH, DB_BUILD_LOG_PATH
          print(f"KOTOBASE_DB_PATH={DATABASE_PATH}")
          print(f"KOTOBASE_LOG_PATH={DB_BUILD_LOG_PATH}")
          PY

      - name: Cache kotobase database
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.KOTOBASE_DB_PATH }}
            ${{ env.KOTOBASE_LOG_PATH }}
          key: kotobase-cache-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Download kotobase database if missing
        run: |
          if [ ! -f "$KOTOBASE_DB_PATH" ]; then
            python -m kotobase.cli pull-db
          else
            echo "Dictionary already exists."
          fi

      - name: Ensure docs directory exists
        run: mkdir -p docs

      - name: Run generator
        run: timeout 18m python nhk_easy_pipeline.py --output docs/index.html --count 4

      - name: Commit updated page
        if: github.event_name != 'push'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/index.html docs/*.tsv docs/*.apkg docs/*.json || true
          git commit -m "update NHK easy page" || echo "no changes"
          git push
