name: NHK Easy Daily

on:
  push:
  schedule:
    - cron: "0 * * * 1-5"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GEMINI_API: ${{ secrets.GEMINI_API != '' && secrets.GEMINI_API || vars.GEMINI_API }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cache-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure docs directory exists
        run: mkdir -p docs

      - name: Run generator
        run: timeout 18m python nhk_easy_pipeline.py --output docs/index.html --count 4

      - name: Commit updated page
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/index.html docs/*.tsv docs/*.apkg docs/*.json || true
          git commit -m "update NHK easy page" || echo "no changes"
          git push
