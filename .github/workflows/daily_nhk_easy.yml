name: NHK Easy Daily

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python nhk_easy_pipeline.py

      - name: commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add docs/index.html
          git commit -m "daily update" || echo "no change"
          git push
