name: NHK Easy Daily

on:
  push:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

env:
  JMDICT_VERSION: dict-v1
  JMDICT_URL: https://github.com/vebaev/NHK/releases/download/dict-v1/jmdict.db

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cache-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Cache JMdict
        uses: actions/cache@v4
        with:
          path: data/jmdict.db
          key: jmdict-cache-${{ runner.os }}-${{ env.JMDICT_VERSION }}

      - name: Download dictionary if missing
        run: |
          if [ ! -f data/jmdict.db ]; then
            echo "Downloading JMdict ${JMDICT_VERSION}..."
            curl -L "$JMDICT_URL" -o data/jmdict.db
          else
            echo "Dictionary already exists."
          fi

      - name: Ensure docs directory exists
        run: mkdir -p docs

      - name: Run generator
        run: timeout 18m python nhk_easy_pipeline.py --output docs/index.html --count 4

      - name: Commit updated page
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/index.html docs/*.tsv docs/*.apkg docs/*.json || true
          git commit -m "update NHK easy page" || echo "no changes"
          git push
